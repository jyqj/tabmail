      operationId: createTenant
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, plan_id]
              properties:
                name: { type: string }
                plan_id: { type: string, format: uuid }
