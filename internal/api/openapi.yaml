      operationId: getUserPermissions
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/EffectivePermission" }
        "404":
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Permissions]
      summary: Set user permission override
      operationId: setUserPermissionOverride
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profile_id:
                  type: string
                  format: uuid
                  description: Permission profile to assign
                overrides:
                  type: object
                  description: Field-level overrides on top of the profile
                  properties:
                    can_send: { type: boolean }
                    daily_send_quota: { type: integer }
                    daily_receive_quota: { type: integer }
                    max_mailboxes: { type: integer }
                    max_domains: { type: integer }
                    allowed_zone_ids:
                      type: array
                      items: { type: string, format: uuid }
                      nullable: true
                    can_create_domains: { type: boolean }
                    can_create_routes: { type: boolean }
                    can_create_api_keys: { type: boolean }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/EffectivePermission" }
        "400":
          $ref: '#/components/responses/BadRequest'
        "404":
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Permissions]
      summary: Delete user permission override
      operationId: deleteUserPermissionOverride
      description: Remove user-specific permission override, reverting to the default profile.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Override removed }
        "404":
          $ref: '#/components/responses/NotFound'

