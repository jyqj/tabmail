      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/PermissionProfile" }
    post:
      tags: [Permissions]
      summary: Create permission profile
      operationId: createPermissionProfile
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                can_send: { type: boolean, default: false }
                daily_send_quota: { type: integer, default: 0, description: "0 = unlimited" }
                daily_receive_quota: { type: integer, default: 0, description: "0 = unlimited" }
                max_mailboxes: { type: integer, default: 0, description: "0 = unlimited" }
                max_domains: { type: integer, default: 0, description: "0 = unlimited" }
                allowed_zone_ids:
                  type: array
                  items: { type: string, format: uuid }
                  nullable: true
                  description: "null = all zones allowed"
                can_create_domains: { type: boolean, default: true }
                can_create_routes: { type: boolean, default: true }
                can_create_api_keys: { type: boolean, default: true }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/PermissionProfile" }
        "400":
          $ref: '#/components/responses/BadRequest'
        "409": { description: Profile name already exists }

