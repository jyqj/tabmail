  # ── Sending ─────────────────────────────────────────
  /api/v1/send:
    post:
      tags: [Sending]
      summary: Send an email
      operationId: sendEmail
      description: |
        Send an outbound email. Requires `send:write` scope for API keys,
        or JWT authentication with `can_send` permission enabled.

        The sender (`from`) domain must be a verified domain zone owned by
        the caller's tenant.

        **Rate limiting**: Subject to daily send quota configured in the
        user's permission profile.
      security:
        - BearerAuth: []
        - APIKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from, to, subject]
              properties:
                from:
                  type: string
                  format: email
                  description: Sender address. Domain must be a verified zone.
                  example: "noreply@mail.example.com"
                to:
                  type: array
                  items:
                    type: string
                    format: email
                  minItems: 1
                  description: Primary recipients
                  example: ["user@gmail.com"]
                cc:
                  type: array
                  items:
                    type: string
                    format: email
                  description: CC recipients
                bcc:
                  type: array
                  items:
                    type: string
                    format: email
                  description: BCC recipients (hidden from other recipients)
                subject:
                  type: string
                  maxLength: 998
                  description: Email subject line
                  example: "Your verification code"
                text_body:
                  type: string
                  description: Plain text body
                  example: "Your code is 123456"
                html_body:
                  type: string
                  description: HTML body
                  example: "<p>Your code is <b>123456</b></p>"
                headers:
                  type: object
                  additionalProperties:
