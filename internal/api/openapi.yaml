  # ── Auth ───────────────────────────────────────────
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in with email and password
      operationId: login
      security: [ {} ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/LoginResponse" }
        "401": { description: Invalid email or password }
        "403": { description: Account disabled }

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new account (when open registration is enabled)
      operationId: register
      security: [ {} ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                display_name: { type: string }
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/LoginResponse" }
        "403": { description: Registration not open }
        "409": { description: Email already registered }

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using a refresh token
      operationId: refreshToken
      security: [ {} ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/RefreshResponse" }
        "401": { description: Invalid or expired refresh token }

  /api/v1/auth/accept-invite:
    post:
      tags: [Auth]
      summary: Accept an admin invitation and create account
      operationId: acceptInvite
      security: [ {} ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invite_code, password]
              properties:
                invite_code: { type: string }
                password: { type: string, minLength: 8 }
                display_name: { type: string }
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/LoginResponse" }
        "400": { description: Invalid or expired invitation }
        "409": { description: Email already registered }

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Log out (revoke refresh token or all tokens)
      operationId: logout
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        "204": { description: Logged out }

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      operationId: getMe
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/User" }
        "401": { description: Not logged in }

  /api/v1/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password for the current user
      operationId: changePassword
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status: { type: string, example: "password changed" }
        "401": { description: Incorrect old password }

