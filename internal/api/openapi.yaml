openapi: "3.1.0"
info:
  title: TabMail API
  version: "2.0"
  description: |
    TabMail is a multi-tenant, API-first disposable email service with both
    inbound (SMTP receive) and outbound (SMTP send) capabilities.

    ## Quick Start for Bot/Automation Users

    ### Step 1: Get an API Key
    ```bash
    # Login to get a JWT token
    curl -X POST https://your-tabmail/api/v1/auth/login \
      -H "Content-Type: application/json" \
      -d '{"email":"you@example.com","password":"your-password"}'

    # Create an API Key with the JWT
    curl -X POST https://your-tabmail/api/v1/keys \
      -H "Authorization: Bearer <jwt_token>" \
      -H "Content-Type: application/json" \
      -d '{"label":"my-bot","scopes":["mailboxes:write","messages:read","send:write"]}'
    ```

    ### Step 2: Create a Disposable Mailbox
    ```bash
    # Get a suggested address
    curl https://your-tabmail/api/v1/domains/{domain_id}/suggest-address \
      -H "X-API-Key: tabmail_..."

    # Create the mailbox
    curl -X POST https://your-tabmail/api/v1/mailboxes \
      -H "X-API-Key: tabmail_..." \
      -H "Content-Type: application/json" \
      -d '{"full_address":"suggested-addr@domain.com","zone_id":"..."}'
    ```

    ### Step 3: Receive Emails (Poll or SSE)
    ```bash
    # Poll for messages
    curl https://your-tabmail/api/v1/mailbox/addr@domain.com \
      -H "X-API-Key: tabmail_..."

    # Or use Server-Sent Events for real-time
    curl -N https://your-tabmail/api/v1/mailbox/addr@domain.com/events \
      -H "X-API-Key: tabmail_..."
    ```

    ### Step 4: Read a Message
    ```bash
    curl https://your-tabmail/api/v1/mailbox/addr@domain.com/{message_id} \
      -H "X-API-Key: tabmail_..."
    ```

    ### Step 5: Send an Email (Requires Permission)
    ```bash
    curl -X POST https://your-tabmail/api/v1/send \
      -H "X-API-Key: tabmail_..." \
      -H "Content-Type: application/json" \
      -d '{
        "from": "noreply@your-verified-domain.com",
        "to": ["recipient@gmail.com"],
        "subject": "Hello from TabMail",
        "text_body": "This is a test email."
      }'
    ```

    ## Authentication

    TabMail supports three authentication methods:

    1. **JWT Bearer Token** — For interactive user sessions. Obtained via `/auth/login`.
    2. **API Key** — For bot/automation use. Header: `X-API-Key: tabmail_...`
    3. **Public Access** — No credentials needed for public mailboxes (read-only).

    ## Rate Limits

    Requests are rate-limited per tenant and per IP. Exceeding the limit
    returns HTTP 429 with error code `RATE_LIMITED`.

    ## Error Format

    All errors follow this format:
    ```json
    {
      "error": {
        "code": "ERROR_CODE",
        "message": "Human-readable description"
      }
    }
    ```

servers:
  - url: /
    description: Current host

tags:
  - name: Auth
    description: Authentication and user session management
  - name: Domains
    description: Domain zone management
  - name: Domain Routes
    description: Routing rules for domain zones
  - name: Mailboxes
    description: Mailbox lifecycle management
  - name: Messages
    description: Message retrieval and management
  - name: Sending
    description: Outbound email sending API
  - name: Permissions
    description: Permission profile management (admin only)
  - name: Admin
    description: Administrative operations
  - name: Grants
    description: Mailbox grants, zone grants, send identities, and send-as grants
  - name: System
    description: Health, metrics, and documentation

security:
  - {}
  - APIKey: []

components:
  securitySchemes:
    APIKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Tenant API key
    MailboxToken:
      type: http
      scheme: bearer
      bearerFormat: TabMail-Mailbox-Token
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token from /auth/login
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - BAD_REQUEST
                - UNAUTHORIZED
                - FORBIDDEN
                - NOT_FOUND
                - CONFLICT
                - RATE_LIMITED
                - QUOTA_EXCEEDED
                - DOMAIN_NOT_VERIFIED
                - SEND_NOT_ALLOWED
                - INTERNAL
            message: { type: string }

    Meta:
      type: object
      properties:
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }

    Plan:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        max_domains: { type: integer }
        max_mailboxes_per_domain: { type: integer }
        max_messages_per_mailbox: { type: integer }
        max_message_bytes: { type: integer }
        retention_hours: { type: integer }
        rpm_limit: { type: integer }
        daily_quota: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Tenant:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        plan_id: { type: string, format: uuid }
        is_super: { type: boolean }
        created_at: { type: string, format: date-time }

    TenantOverride:
      type: object
      properties:
        max_domains: { type: integer, nullable: true }
        max_mailboxes_per_domain: { type: integer, nullable: true }
        max_messages_per_mailbox: { type: integer, nullable: true }
        max_message_bytes: { type: integer, nullable: true }
        retention_hours: { type: integer, nullable: true }
        rpm_limit: { type: integer, nullable: true }
        daily_quota: { type: integer, nullable: true }

    EffectiveConfig:
      type: object
      properties:
        max_domains: { type: integer }
        max_mailboxes_per_domain: { type: integer }
        max_messages_per_mailbox: { type: integer }
        max_message_bytes: { type: integer }
        retention_hours: { type: integer }
        rpm_limit: { type: integer }
        daily_quota: { type: integer }

    DomainZone:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        owner_user_id: { type: string, format: uuid, nullable: true }
        parent_zone_id: { type: string, format: uuid, nullable: true }
        domain: { type: string }
        visibility: { type: string, enum: [private, authenticated, public] }
        allow_random_subdomains: { type: boolean }
        is_verified: { type: boolean }
        mx_verified: { type: boolean }
        txt_record: { type: string }
        created_at: { type: string, format: date-time }
        verified_at: { type: string, format: date-time, nullable: true }

    DomainRoute:
      type: object
      properties:
        id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        route_type: { type: string, enum: [exact, wildcard, deep_wildcard, sequence] }
        match_value: { type: string }
        range_start: { type: integer, nullable: true }
        range_end: { type: integer, nullable: true }
        auto_create_mailbox: { type: boolean }
        retention_hours_override: { type: integer, nullable: true }
        access_mode_default: { type: string, enum: [public, token, api_key] }
        created_at: { type: string, format: date-time }

    SuggestedAddress:
      type: object
      properties:
        zone_id: { type: string, format: uuid }
        base_domain: { type: string }
        domain: { type: string }
        subdomain_label: { type: string, nullable: true }
        local_part: { type: string }
        address: { type: string }
        mode: { type: string, enum: [mailbox, subdomain] }
        algorithm: { type: string }

    Mailbox:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        local_part: { type: string }
        resolved_domain: { type: string }
        full_address: { type: string }
        access_mode: { type: string, enum: [public, token, api_key] }
        retention_hours_override: { type: integer, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    Message:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        mailbox_id: { type: string, format: uuid }
        sender: { type: string }
        recipients: { type: array, items: { type: string } }
        subject: { type: string }
        size: { type: integer }
        seen: { type: boolean }
        headers: { type: object }
        received_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }

    MessageDetail:
      allOf:
        - $ref: "#/components/schemas/Message"
        - type: object
          properties:
            text_body: { type: string }
            html_body: { type: string }

    APIKeyScope:
      type: string
      enum:
        - domains:read
        - domains:write
        - routes:read
        - routes:write
        - mailboxes:read
        - mailboxes:write
        - messages:read
        - messages:write
        - send:read
        - send:write

    APIKeyCreated:
      type: object
      properties:
        id: { type: string, format: uuid }
        key: { type: string, description: "Full key (shown only once)" }
        key_prefix: { type: string }
        label: { type: string }
        scopes:
          type: array
          items: { $ref: "#/components/schemas/APIKeyScope" }
        created_at: { type: string, format: date-time }

    MailboxTokenResponse:
      type: object
      properties:
        token: { type: string }
        expires_in: { type: integer }

    AuditEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        actor: { type: string }
        action: { type: string }
        resource_type: { type: string }
        resource_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }

    SMTPMetrics:
      type: object
      properties:
        sessions_opened: { type: integer }
        sessions_active: { type: integer }
        recipients_accepted: { type: integer }
        recipients_rejected: { type: integer }
        messages_accepted: { type: integer }
        messages_rejected: { type: integer }
        deliveries_succeeded: { type: integer }
        deliveries_failed: { type: integer }
        bytes_received: { type: integer }

    WebhookMetrics:
      type: object
      properties:
        enabled: { type: boolean }
        configured: { type: integer }
        queued: { type: integer }
        delivered: { type: integer }
        failed: { type: integer }

    RealtimeMetrics:
      type: object
      properties:
        subscribers_current: { type: integer }
        events_published: { type: integer }

    MetricPoint:
      type: object
      properties:
        at: { type: string, format: date-time }
        smtp_accepted: { type: integer }
        smtp_rejected: { type: integer }
        deliveries_ok: { type: integer }
        deliveries_failed: { type: integer }
        webhooks_delivered: { type: integer }
        webhooks_failed: { type: integer }
        realtime_published: { type: integer }

    DeliveryStats:
      type: object
      properties:
        key: { type: string }
        accepted: { type: integer }
        rejected: { type: integer }
        deliveries_ok: { type: integer }
        deliveries_failed: { type: integer }

    DeadLetter:
      type: object
      properties:
        id: { type: string }
        url: { type: string }
        event_type: { type: string }
        payload: { type: object }
        attempts: { type: integer }
        last_error: { type: string }
        created_at: { type: string, format: date-time }
        last_tried_at: { type: string, format: date-time }

    SMTPPolicy:
      type: object
      properties:
        default_accept: { type: boolean }
        accept_domains: { type: array, items: { type: string } }
        reject_domains: { type: array, items: { type: string } }
        default_store: { type: boolean }
        store_domains: { type: array, items: { type: string } }
        discard_domains: { type: array, items: { type: string } }
        reject_origin_domains: { type: array, items: { type: string } }
        updated_at: { type: string, format: date-time }

    MonitorEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string }
        mailbox: { type: string }
        message_id: { type: string }
        sender: { type: string }
        subject: { type: string }
        size: { type: integer }
        at: { type: string, format: date-time }

    MetricsSnapshot:
      type: object
      properties:
        started_at: { type: string, format: date-time }
        uptime_seconds: { type: integer }
        smtp: { $ref: "#/components/schemas/SMTPMetrics" }
        webhooks: { $ref: "#/components/schemas/WebhookMetrics" }
        realtime: { $ref: "#/components/schemas/RealtimeMetrics" }
        time_series:
          type: array
          items: { $ref: "#/components/schemas/MetricPoint" }

    SystemStats:
      type: object
      properties:
        tenants_count: { type: integer }
        plans_count: { type: integer }
        domains_count: { type: integer }
        mailboxes_count: { type: integer }
        messages_count: { type: integer }
        metrics: { $ref: "#/components/schemas/MetricsSnapshot" }
        recent_audit:
          type: array
          items: { $ref: "#/components/schemas/AuditEntry" }
        tenant_delivery:
          type: array
          items: { $ref: "#/components/schemas/DeliveryStats" }
        mailbox_delivery:
          type: array
          items: { $ref: "#/components/schemas/DeliveryStats" }
        dead_letters:
          type: array
          items: { $ref: "#/components/schemas/DeadLetter" }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        email: { type: string }
        display_name: { type: string }
        role: { type: string, enum: [admin, user] }
        is_active: { type: boolean }
        permission_profile_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        last_login_at: { type: string, format: date-time, nullable: true }

    LoginResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, example: Bearer }
        expires_in: { type: integer }
        user: { $ref: "#/components/schemas/User" }

    RefreshResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, example: Bearer }
        expires_in: { type: integer }

    IngestJob:
      type: object
      properties:
        id: { type: string, format: uuid }
        source: { type: string }
        remote_ip: { type: string }
        mail_from: { type: string }
        recipients: { type: array, items: { type: string } }
        state: { type: string }
        attempts: { type: integer }
        last_error: { type: string }
        next_attempt_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    WebhookDelivery:
      type: object
      properties:
        id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        url: { type: string }
        event_type: { type: string }
        payload: { type: object }
        state: { type: string }
        attempts: { type: integer }
        last_error: { type: string }
        next_attempt_at: { type: string, format: date-time }
        last_tried_at: { type: string, format: date-time, nullable: true }
        delivered_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SystemSetting:
      type: object
      properties:
        key: { type: string }
        value: { type: string }
        description: { type: string }
        updated_at: { type: string, format: date-time }

    AdminInvitation:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        invite_code: { type: string }
        expires_at: { type: string, format: date-time }

    # ── Sending Schemas ──────────────────────────────────
    SendEmailResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        message_id:
          type: string
          example: "<uuid@mail.example.com>"
        state:
          $ref: '#/components/schemas/OutboundState'
        created_at:
          type: string
          format: date-time

    OutboundState:
      type: string
      enum: [pending, processing, sent, retry, failed, dead]

    OutboundJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        mail_from:
          type: string
        rcpt_to:
          type: array
          items:
            type: string
        subject:
          type: string
        state:
          $ref: '#/components/schemas/OutboundState'
        attempts:
          type: integer
        max_attempts:
          type: integer
        last_error:
          type: string
        smtp_code:
          type: integer
        smtp_response:
          type: string
        message_id_header:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Permission Schemas ───────────────────────────────
    PermissionProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        can_send:
          type: boolean
        daily_send_quota:
          type: integer
          description: "0 = unlimited"
        daily_receive_quota:
          type: integer
          description: "0 = unlimited"
        max_mailboxes:
          type: integer
          description: "0 = unlimited"
        max_domains:
          type: integer
          description: "0 = unlimited"
        allowed_zone_ids:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
          description: "null = all zones allowed"
        can_create_domains:
          type: boolean
        can_create_routes:
          type: boolean
        can_create_api_keys:
          type: boolean
        is_system:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EffectivePermission:
      type: object
      properties:
        can_send:
          type: boolean
        daily_send_quota:
          type: integer
        daily_receive_quota:
          type: integer
        max_mailboxes:
          type: integer
        max_domains:
          type: integer
        allowed_zone_ids:
          type: array
          items:
            type: string
            format: uuid
          nullable: true
        can_create_domains:
          type: boolean
        can_create_routes:
          type: boolean
        can_create_api_keys:
          type: boolean

    # -- Grant Schemas ────────────────────────────────
    MailboxGrant:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        mailbox_id: { type: string, format: uuid }
        principal_type: { type: string, enum: [user, api_key] }
        principal_id: { type: string, format: uuid }
        role: { type: string, enum: [owner, manager, writer, reader] }
        created_at: { type: string, format: date-time }

    ZoneGrant:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        principal_type: { type: string, enum: [user, api_key] }
        principal_id: { type: string, format: uuid }
        role: { type: string, enum: [owner, admin, editor, viewer] }
        created_by: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }

    SendIdentity:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        zone_id: { type: string, format: uuid }
        mailbox_id: { type: string, format: uuid, nullable: true }
        address: { type: string }
        identity_type: { type: string, enum: [exact, domain_wildcard] }
        verified: { type: boolean }
        created_at: { type: string, format: date-time }

    SendAsGrant:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        identity_id: { type: string, format: uuid }
        principal_type: { type: string, enum: [user, api_key] }
        principal_id: { type: string, format: uuid }
        daily_quota: { type: integer, description: "0 = unlimited" }
        created_at: { type: string, format: date-time }

    CreateMailboxGrantRequest:
      type: object
      required: [principal_type, principal_id, role]
      properties:
        principal_type: { type: string, enum: [user, api_key] }
        principal_id: { type: string, format: uuid }
        role: { type: string, enum: [owner, manager, writer, reader] }

    CreateZoneGrantRequest:
      type: object
      required: [principal_type, principal_id, role]
      properties:
        principal_type: { type: string, enum: [user, api_key] }
        principal_id: { type: string, format: uuid }
        role: { type: string, enum: [owner, admin, editor, viewer] }

    CreateSendIdentityRequest:
      type: object
      required: [zone_id, address]
      properties:
        zone_id: { type: string, format: uuid }
        address: { type: string, example: "noreply@mail.example.com" }

    CreateSendAsGrantRequest:
      type: object
      required: [principal_type, principal_id]
      properties:
        principal_type: { type: string, enum: [user, api_key] }
        principal_id: { type: string, format: uuid }
        daily_quota: { type: integer, default: 0, description: "0 = unlimited" }

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    QuotaExceeded:
      description: Daily quota exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: QUOTA_EXCEEDED
              message: "daily send quota exceeded (50/50)"

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number
    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        default: 30
        minimum: 1
        maximum: 100
      description: Items per page

paths:
  /api/v1/token:
    post:
      tags: [Mailboxes]
      summary: Issue a mailbox access token
      operationId: issueMailboxToken
      security: [ {} ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, password]
              properties:
                address: { type: string, example: "user@mail.example.com" }
                password: { type: string }
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/MailboxTokenResponse" }
        "403": { description: Invalid credentials or mailbox access mode }

  # ── Open Domain Resources ───────────────────────────
  /api/v1/resources/domains:
    get:
      tags: [Domains]
      summary: List verified domain resources open to the current viewer
      operationId: listOpenDomains
      security: [ {}, { BearerAuth: [] } ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/DomainZone" }

