    post:
      tags: [Admin]
      summary: Create a plan
      operationId: createPlan
      security: [{ AdminKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Plan" }
      responses:
        "201": { description: Created }

