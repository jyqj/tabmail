      operationId: getMessageSource
      security: [ {}, { APIKey: [] }, { BearerAuth: [] }, { MailboxToken: [] } ]
      parameters:
        - name: address
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Raw email
          content:
            message/rfc822:
              schema: { type: string, format: binary }

