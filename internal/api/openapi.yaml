    patch:
      tags: [Permissions]
      summary: Update permission profile
      operationId: updatePermissionProfile
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                can_send: { type: boolean }
                daily_send_quota: { type: integer }
                daily_receive_quota: { type: integer }
                max_mailboxes: { type: integer }
                max_domains: { type: integer }
                allowed_zone_ids:
                  type: array
                  items: { type: string, format: uuid }
                  nullable: true
                can_create_domains: { type: boolean }
                can_create_routes: { type: boolean }
                can_create_api_keys: { type: boolean }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/PermissionProfile" }
        "400":
          $ref: '#/components/responses/BadRequest'
        "404":
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Permissions]
      summary: Delete permission profile
      operationId: deletePermissionProfile
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Deleted }
        "400": { description: Cannot delete system profiles }
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/admin/users/{id}/permissions:
    get:
      tags: [Permissions]
