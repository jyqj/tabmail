services:
  tabmail:
    build: .
    ports:
      - "8080:8080"
      - "2525:2525"
    environment:
      TABMAIL_ADMINKEY: "${TABMAIL_ADMIN_KEY:-changeme}"
      TABMAIL_DB_DSN: "postgres://tabmail:tabmail@postgres:5432/tabmail?sslmode=disable"
      TABMAIL_REDIS_ADDR: "redis:6379"
      TABMAIL_SMTP_DOMAIN: "${SMTP_DOMAIN:-localhost}"
      TABMAIL_DATADIR: "/data"
      TABMAIL_LOGLEVEL: "info"
    volumes:
      - mail_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tabmail
      POSTGRES_PASSWORD: tabmail
      POSTGRES_DB: tabmail
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tabmail"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
  mail_data:
